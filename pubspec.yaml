name: doc_generator
description: Document Generator Web — замена Telegram-бота

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Routing
  go_router: ^14.0.0

  # State management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # HTTP
  dio: ^5.4.0

  # Utilities
  intl: ^0.19.0
  file_saver: ^0.2.8
  url_launcher: ^6.2.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
